<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Research | Yen-Wen Lu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="map.css">
  <link rel="stylesheet" href="v6.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="page-hero">
      <div class="container">
        <p class="kicker">RESEARCH</p>
        <h1 id="title"></h1>
        <p id="lead"></p>
      </div>
    </section>

    <section class="section soft">
      <div class="container">
        <p class="kicker">FEATURED RESEARCH DIRECTIONS</p>
        <h2 id="flowTitle"></h2>
        <p class="intro" id="flowText"></p>
        <div id="list" class="grid research-grid"></div>
      </div>
    </section>

    <section class="section research-entry-section">
      <div class="container">
        <p class="kicker">FOUR WAYS TO ENTER THE LAB</p>
        <h2 id="entryTitle"></h2>
        <p class="intro" id="entryLead"></p>
        <div class="research-entry-grid" id="entryGrid"></div>
        <p class="research-entry-note" id="entryNote"></p>
        <div class="section-action"><a class="btn primary" href="pathways.html" id="entryAction"></a></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <p class="kicker">A SHARED RESEARCH APPROACH</p>
        <h2 id="approachTitle"></h2>
        <p class="intro" id="approachLead"></p>
        <div class="research-approach" id="approach"></div>
      </div>
    </section>

    <section class="section soft">
      <div class="container">
        <p class="kicker">SELECTED DEMONSTRATIONS</p>
        <h2 id="demoTitle"></h2>
        <p class="intro" id="demoLead"></p>
        <div class="mechanical-video-grid" id="researchVideos"></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <p class="kicker">HOW THE DIRECTIONS CONNECT</p>
        <h2 id="mapTitle"></h2>
        <p class="intro" id="mapText"></p>
        <img class="technology-map" src="assets/brand/technology-map.svg" alt="Technology map connecting research directions">
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script>window.BASE="";</script>
  <script src="app.js"></script>
  <script>
    initShell();
    const z=state.lang==="zh",t=(en,cn)=>z?cn:en;
    title.textContent=t("From mechanisms to useful systems","從機制到可用系統");
    lead.textContent=t(
      "Mechanics, mechatronics, biomedical engineering, and AI come together to build devices that can be measured, validated, and used in real settings.",
      "我們結合機械、機電、生醫與 AI，建立可量測、可驗證，並能走向真實場域的裝置與系統。"
    );
    flowTitle.textContent=t("Different technologies, one shared method","不同技術，共享一套研究方法");
    flowText.textContent=t(
      "The projects may look different, but they share the same path: understand a physical or biological problem, build a device or system, measure carefully, and use data analysis or AI when it helps the result become more reliable and useful.",
      "這些研究題目外觀不同，但共享同一條路徑：理解物理或生物問題、建立裝置或系統、嚴謹量測，並在需要時導入資料分析或 AI，讓結果更可靠、更有用。"
    );

    entryTitle.textContent=t("Start from your strength and find a research direction","從你的專長出發，找到研究起點");
    entryLead.textContent=t(
      "Graduate students enter the department through four broad areas. The lab provides a concrete starting point for each one, then helps students connect their original strength with the other three.",
      "本系研究所新生主要從四個領域進入。實驗室讓每一種背景都能先從熟悉的專長切入，再逐步與其他三個方向整合。"
    );
    const entryItems=[
      ["Mechanical engineering","Begin with fluid mechanics, droplet dynamics, filtration, heat transfer, structures, or soft materials. Grow toward microfluidic and biomedical devices.","機械","可從流體力學、液滴動力、過濾、熱傳、結構或軟性材料出發，再延伸到微流體與生醫裝置。"],
      ["Mechatronic integration","Begin with sensors, actuation, circuits, fabrication, control, or system integration. Grow toward complete experimental and field-ready platforms.","機電整合","可從感測、致動、電路、製程、控制或系統整合出發，再建立完整的實驗與場域驗證平台。"],
      ["Biomedical / biological processes","Begin with samples, cells, exosomes, molecular assays, physiology, or clinical needs. Grow toward repeatable and measurable engineering workflows.","生醫／生物程序","可從樣品、細胞、外泌體、分子檢測、生理或臨床需求出發，再建立可重複、可量測的工程流程。"],
      ["AI and data science","Begin with signal processing, statistics, machine learning, or model validation. Grow by working with real sensors, experiments, and domain constraints—not data alone.","AI 與資料科學","可從訊號處理、統計、機器學習或模型驗證出發，並結合真實感測器、實驗資料與領域限制，而不只停留在資料分析。"]
    ];
    entryGrid.innerHTML=entryItems.map((x,i)=>`<article><span>0${i+1}</span><h3>${t(x[0],x[2])}</h3><p>${t(x[1],x[3])}</p></article>`).join("");
    entryNote.textContent=t(
      "You do not need to arrive with all four abilities. A strong thesis usually begins with one foundation and becomes valuable by learning how to collaborate across the others.",
      "加入時不需要同時具備四種能力。好的論文通常先建立一項核心專長，再透過跨領域合作，讓研究產生真正的價值。"
    );
    entryAction.textContent=t("Explore ways to join","查看加入方式");

    approachTitle.textContent=t("From physical mechanisms to evidence that can be used","從物理機制走向可被使用的工程證據");
    approachLead.textContent=t(
      "Rather than separating projects into rigid categories, we use one shared development approach across microfluidics, sensing, biomedical systems, AI, and soft machines.",
      "我們不以僵硬分類切割題目，而是讓微流體、感測、生醫系統、AI 與軟性機器人共享同一套研究方法。"
    );
    const approachItems=[
      ["01 · Understand","Start with the fluidic, mechanical, biological, or clinical mechanism that limits current practice.","01 · 理解問題","先釐清限制現有方法的流體、機械、生物或臨床機制。"],
      ["02 · Build","Turn the mechanism into a chip, sensor, actuator, experimental platform, or integrated prototype.","02 · 建立裝置","把機制轉化為晶片、感測器、致動器、實驗平台或整合原型。"],
      ["03 · Measure","Collect traceable data and test whether the system remains reliable under realistic conditions.","03 · 嚴謹量測","取得可追溯的資料，並檢驗系統在接近真實條件下是否仍然可靠。"],
      ["04 · Interpret and translate","Use analysis or AI when it adds value, then connect the evidence to health, production, or everyday use.","04 · 判讀與轉譯","在真正有幫助時導入資料分析或 AI，再把證據連到健康、生產或日常應用。"]
    ];
    approach.innerHTML=approachItems.map(x=>`<article><b>${t(x[0],x[2])}</b><p>${t(x[1],x[3])}</p></article>`).join("");

    demoTitle.textContent=t("See selected ideas in motion","觀看代表性研究概念如何運作");
    demoLead.textContent=t(
      "These short demonstrations connect earlier foundations with current directions—from droplet control and exosome processing to nanoscale teaching and wearable AI.",
      "這些短片把早期基礎與目前研究方向連起來，涵蓋液滴控制、外泌體處理、奈米尺度教學，以及穿戴裝置與 AI。"
    );
    const researchVideoData=[
      ["972roQFlIqo","Exosome microfluidics","外泌體微流體"],
      ["4xJ3vyuzWd0","TENG-powered digital microfluidics","TENG 自供電數位微流體"],
      ["1okl0gkwwUw","LEGO atomic force microscope","樂高原子力顯微鏡"],
      ["CWvfrA86jak","Wearable devices and AI","穿戴裝置與 AI"]
    ];
    researchVideos.innerHTML=researchVideoData.map(v=>`<article class="mechanical-video"><div class="video-frame"><iframe src="https://www.youtube-nocookie.com/embed/${v[0]}" title="${t(v[1],v[2])}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div><b>${t(v[1],v[2])}</b></article>`).join("");

    mapTitle.textContent=t("From basic science to useful decisions","從基礎科學走向有用決策");
    mapText.textContent=t(
      "The directions share one development logic: understand a physical mechanism, make a novel device, collect useful data reliably, analyse the evidence, and create a path toward better health and everyday life.",
      "各研究方向共享一條發展邏輯：理解物理機制、做出新穎元件、可靠地取得有用資料、分析證據，並走向改善健康與日常生活的應用。"
    );
    load("data/research.json").then(d=>list.innerHTML=d.map(researchCard).join(""));
  </script>
</body>
</html>
