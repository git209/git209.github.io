<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Research | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="map.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker">RESEARCH</p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container"><p class="kicker">HOW THE SIX DIRECTIONS CONNECT</p><h2 id="mapTitle"></h2><p class="intro" id="mapText"></p><img class="technology-map" src="assets/brand/technology-map.svg" alt="Technology map connecting research directions"></div></section><section class="section soft"><div class="container"><p class="kicker">SIX CONNECTED DIRECTIONS</p><h2 id="flowTitle"></h2><p class="intro" id="flowText"></p><div class="research-flow six-flow"><span>Digital microfluidics</span><span>Acoustofluidics</span><span>Wearables</span><span>AI healthcare</span><span>Soft robotics</span><span>Exosome engineering</span></div><div id="list" class="grid research-grid"></div></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script>initShell();const z=state.lang==="zh",t=(en,cn)=>z?cn:en;title.textContent=t("Six research directions, one purpose: better lives through better decisions","六大研究主軸，一個共同目的：用更好的決策改善人類生活");lead.textContent=t("We build novel devices that collect useful data effectively, then turn that evidence into analysis and decisions that can improve human life.","我們發展新穎元件以有效取得有用資料，再將證據轉為分析與決策，進而改善人類生活。");mapTitle.textContent=t("From basic science to useful decisions","從基礎科學走向有用決策");mapText.textContent=t("The six directions share one development logic: understand a physical mechanism, make a novel device, collect useful data reliably, analyse the evidence, and create a path toward better health and everyday life.","六大方向共享一條發展邏輯：理解物理機制、做出新穎元件、可靠地取得有用資料、分析證據，並走向改善健康與日常生活的應用。");flowTitle.textContent=t("Different technologies, a shared contribution","不同技術，共同貢獻");flowText.textContent=t("Digital microfluidics and acoustofluidics control samples; exosome engineering develops a distinct biological preparation route; wearable sensors capture life outside the laboratory; AI helps interpret complex signals; and soft robotics brings sensing into safe physical action.","數位微流體與聲流體控制樣品；外泌體工程發展獨立的生物製備路徑；穿戴式感測捕捉實驗室外的生活訊號；AI 協助解讀複雜資料；軟性機器人則把感測帶入安全的實體行動。");load("data/research.json").then(d=>list.innerHTML=d.map(researchCard).join(""));</script></body></html>
