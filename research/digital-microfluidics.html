<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Digital Microfluidics | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker" id="tag"></p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container research-story"><img id="img" alt="Frequency-controlled EWOD droplet splitting"><p class="research-narrative" id="story"></p></div></section><section class="section soft"><div class="container"><div id="evidence" class="metric-grid"></div></div></section><section class="section"><div class="container"><h2 id="learnTitle"></h2><div id="learn" class="learn-grid"></div></div></section></main><div id="footer"></div><script>window.BASE="../";</script><script src="../app.js"></script><script>visualSets["digital-microfluidics"]=["assets/research/dmf-ewod-frequency-splitting.png","assets/research/dmf.webp","assets/research/lab-on-a-chip-concept.jpg"];stories["digital-microfluidics"]={zh:"一滴液體可以是一個微型反應器，也可以是一個被精準編排的實驗步驟。數位微流體讓液滴在電極引導下移動、混合、分裂與定量，把原本依賴多個器材與人工操作的流程，轉化成可重複的晶片操作。最新平行板 EWOD 技術進一步顯示，僅調整驅動頻率便能改變分裂結果：500 Hz 形成兩種體積族群；1 kHz 則可生成較多數目、nL 等級的體積均一液滴。這種看似簡單的控制，正是平行試劑定量、序列稀釋與多重基因／疾病檢測所需要的基礎。",en:"A droplet can be a miniature reactor and a precisely scheduled experimental step. Digital microfluidics moves, mixes, splits, and meters droplets under programmed electrodes, turning workflows that once required several instruments and careful manual handling into repeatable chip operations. Our recent parallel-plate EWOD work shows that changing only the actuation frequency changes the splitting result: 500 Hz forms two volume populations, while 1 kHz produces a larger number of volume-uniform droplets at the nanolitre scale. This apparently simple control is a foundation for parallel reagent metering, serial dilution, and multiplex gene or disease diagnostics."};initShell();renderResearchPage("digital-microfluidics")</script></body></html>
