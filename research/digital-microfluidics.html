<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Digital Microfluidics | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker" id="tag"></p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container research-story"><img id="img" alt="Frequency-controlled EWOD droplet splitting"><p class="research-narrative" id="story"></p></div></section><section class="section soft"><div class="container"><div id="evidence" class="metric-grid"></div></div></section><section class="section"><div class="container"><h2 id="learnTitle"></h2><div id="learn" class="learn-grid"></div></div></section></main><div id="footer"></div><script>window.BASE="../";</script><script src="../app.js"></script><script>visualSets["digital-microfluidics"]=["assets/research/dmf-ewod-frequency-splitting.png","assets/research/dmf.webp","assets/research/lab-on-a-chip-concept.jpg"];stories["digital-microfluidics"]={zh:"要把一滴血或少量檢體變成可信賴的基因／疾病判讀，困難常不只在最後的檢測反應，而是取樣、混合、分離與定量。數位微流體把這些步驟濃縮在晶片上，讓液滴在電極引導下移動、混合與分裂。最新的平行板 EWOD 研究更顯示，僅調整驅動頻率就能改變分裂結果：500 Hz 形成兩種體積，1 kHz 則產生約 20 顆均一液滴。這樣的控制可用於試劑定量、序列稀釋與多重檢測，也為外泌體製備、清洗與分子讀出建立更少試劑、更少人工步驟的流程。",en:"Turning a drop of blood or a scarce sample into a trustworthy gene or disease result is not only about the final assay. Sampling, mixing, separation, and quantification are often the real obstacles. Digital microfluidics brings these steps onto a chip, where droplets move, mix, and split under programmed electrodes. Our recent parallel-plate EWOD work shows that changing only the actuation frequency changes the splitting result: 500 Hz produces two volume populations, while 1 kHz generates about 20 uniform droplets. This control can support reagent metering, serial dilution, and multiplex assays, while creating a lower-reagent, lower-manual-step route toward exosome preparation and molecular readout."};initShell();renderResearchPage("digital-microfluidics")</script></body></html>
