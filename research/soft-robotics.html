<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Adaptive Bioinspired Systems | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker" id="tag"></p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container research-story"><img id="img" alt="Soft bioinspired robotic system"><p class="research-narrative" id="story"></p></div></section><section class="section soft"><div class="container"><div id="evidence" class="metric-grid"></div></div></section><section class="section"><div class="container"><h2 id="learnTitle"></h2><div id="learn" class="learn-grid"></div></div></section></main><div id="footer"></div><script>window.BASE="../";</script><script src="../app.js"></script><script>stories["soft-robotics"]={zh:"當機器人接觸人體、細胞或農作物時，力量並非越大越好；更重要的是能否安全、柔順而精準地回應環境。團隊以磁性軟材料設計可程式化的仿生運動，從微型手部操控到軟性抓取，探索如何把感測、材料與控制結合。這項研究讓一般讀者看見，機器人的價值不只在速度或力量，而在於能否更貼近真實世界中脆弱、變動且需要被理解的對象。",en:"When robots interact with people, cells, or crops, greater force is not always better. What matters is responding safely, gently, and precisely to the environment. We use magnetic soft materials to programme biomimetic motion, from microhand manipulation to compliant grasping, while exploring how sensing, materials, and control can work together. This work shows a broader audience that a robot's value is not only its speed or force, but its ability to work thoughtfully with fragile and changing real-world environments."};publicLearning["soft-robotics"]=["See how material choice can change the way a robot moves.","Compare rigid precision with soft, safe interaction.","Explore how sensing and control can guide adaptive movement."];publicLearningZh["soft-robotics"]=["觀察材料選擇如何改變機器人的運動方式。","比較剛性精準與軟性安全互動的差異。","探索感測與控制如何引導適應性運動。"];initShell();renderResearchPage("soft-robotics")</script></body></html>
