<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Exosome Engineering | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker" id="tag"></p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container research-story"><img id="img" alt=""><p class="research-narrative" id="story"></p></div></section><section class="section soft"><div class="container"><div id="evidence" class="metric-grid"></div></div></section><section class="section"><div class="container"><h2 id="learnTitle"></h2><div id="learn" class="learn-grid"></div></div></section></main><div id="footer"></div><script>window.BASE="../";</script><script src="../app.js"></script><script>visualSets["exosome-engineering"]=["assets/research/dmf-ewod-frequency-splitting.png","assets/research/lab-on-a-chip-concept.jpg","assets/research/ntu-biomedical-cleanroom.jpg"];stories["exosome-engineering"]={zh:"外泌體很小，卻攜帶細胞之間溝通的分子訊息。真正困難的不是只看見它，而是如何在有限樣品中，以一致方式完成捕捉、清洗、載入與分析。團隊正把數位微流體的液滴操控帶入這個流程：每一滴液體都能在晶片上被精準移動、混合與分配，讓外泌體製備與工程化步驟更可追蹤。這項研究也讓一般讀者理解，微型化的價值不只是把設備縮小，而是讓珍貴樣品、試劑與每一步反應，都更有機會被有效利用。",en:"Exosomes are tiny, yet they carry molecular messages between cells. The challenge is not simply to see them, but to capture, wash, load, and analyse them consistently from limited samples. Our work brings the programmable droplet control of digital microfluidics into this workflow. Each droplet can be moved, mixed, and metered on chip, making exosome preparation and engineering steps more traceable. For a general audience, this shows that miniaturisation is not only about making equipment smaller: it is about using precious samples, reagents, and each reaction step more carefully."};initShell();renderResearchPage("exosome-engineering")</script></body></html>
