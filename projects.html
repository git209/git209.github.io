<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Projects | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><h1 id="title"></h1><p id="intro"></p></div></section><section class="section"><div class="container"><div id="filters" class="filters"></div><div id="list" class="grid cards"></div></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script>initShell();title.textContent=tx('Research Projects','研究計畫');intro.textContent=tx('Explore each platform through a dedicated research page.','透過獨立研究頁深入了解各項研究平台。');load('data/projects.json').then(d=>{const cats=[...new Set(d.map(x=>tx(x.category,x.categoryZh)))];filters.innerHTML='<button class="filter active" data-c="all">'+tx('All','全部')+'</button>'+cats.map(c=>'<button class="filter" data-c="'+c+'">'+c+'</button>').join('');const draw=c=>list.innerHTML=d.filter(x=>c==='all'||tx(x.category,x.categoryZh)===c).map(projectCard).join('');draw('all');filters.querySelectorAll('button').forEach(b=>b.onclick=()=>{filters.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');draw(b.dataset.c)})});</script></body></html>
