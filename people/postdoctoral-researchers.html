<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Postdoctoral Fellows & Researchers | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker" id="role"></p><h1 id="name"></h1><p id="bio"></p></div></section><section class="section"><div class="container profile-hero"><img id="img"><div><h2 id="fh"></h2><div id="ints" class="tag-row"></div></div></div></section><section class="section soft" id="grad"><div class="container"><h2 id="gh"></h2><div id="cards" class="story-grid"></div></div></section></main><div id="footer"></div><script>window.BASE="../";</script><script src="../app.js"></script><script>initShell("people");load("data/people.json").then(d=>{const p=d.find(x=>x.id==="postdoctoral-researchers");role.textContent=tx(p.role,p.roleZh);name.textContent=tx(p.name,p.nameZh);bio.textContent=tx(p.bio,p.bioZh);img.src="../"+p.image;fh.textContent=tx("Research and professional development","研究與專業發展");ints.innerHTML=p.interests.map(x=>`<span class="tag">${x}</span>`).join("");if(p.id!=="graduate-students")grad.style.display="none";else{gh.textContent=tx("What graduate students learn beyond a research topic","研究生在題目之外會學到什麼");const a=[["Learn by doing","從實作中學習"],["Ask why","持續追問為什麼"],["Take ownership","對研究負責"],["Communicate clearly","清楚溝通"],["Work across disciplines","跨領域合作"],["Create impact","創造影響"]];cards.innerHTML=a.map(x=>`<article class="story-card"><h3>${tx(x[0],x[1])}</h3></article>`).join("");}});</script></body></html>
