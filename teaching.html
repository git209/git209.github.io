<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Teaching | Yen-Wen Lu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="v6.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="page-hero">
      <div class="container">
        <p class="kicker">TEACHING</p>
        <h1 id="title"></h1>
        <p id="lead"></p>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <p class="kicker">TEACHING THROUGH RESEARCH</p>
        <h2 id="stanceH"></h2>
        <p class="intro" id="stanceP"></p>
        <div id="ph" class="story-grid"></div>
      </div>
    </section>
    <section class="section soft">
      <div class="container">
        <p class="kicker">COURSES I TEACH</p>
        <h2 id="coursesH"></h2>
        <p class="intro" id="coursesP"></p>
        <div class="v6-systems" id="courses"></div>
      </div>
    </section>
    <section class="section">
      <div class="container split">
        <img src="assets/team/team-students.webp" alt="Students in the laboratory">
        <div>
          <p class="kicker">STUDENT TRAINING</p>
          <h2 id="gh"></h2>
          <p class="intro" id="gt"></p>
          <div id="training" class="tag-row"></div>
        </div>
      </div>
    </section>
    <section class="section soft">
      <div class="container">
        <p class="kicker">WHO CAN GROW HERE</p>
        <h2 id="fitH"></h2>
        <div class="application-grid" id="fit"></div>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script>window.BASE="";</script>
  <script src="app.js"></script>
  <script src="v6.js"></script>
  <script>
    initShell("teaching");
    title.textContent = tx("Teaching students to turn effort into evidence","訓練學生把努力變成證據");
    lead.textContent = tx(
      "Teaching in the lab is not separated from research. Students learn by reading, building, measuring, analysing, revising, and communicating a result that can stand in front of others.",
      "實驗室的教學不與研究分開。學生透過閱讀、製作、量測、分析、修正與表達，學會把成果放到別人面前接受檢驗。"
    );
    stanceH.textContent = tx("The point is not only to finish a task","重點不只是完成交辦事項");
    stanceP.textContent = tx(
      "Students are trained to understand why a device works, why data may be unreliable, and how to make the next experiment stronger.",
      "我們訓練學生理解裝置為何有效、資料為何可能不可靠，以及如何讓下一個實驗更有說服力。"
    );
    gh.textContent = tx("How we train future researchers","我們如何培育未來研究者");
    gt.textContent = tx(
      "Students gradually move from learning methods to understanding mechanisms, defining problems, and leading a complete research story.",
      "學生逐步從學會方法，走向理解機制、定義問題，並主導完整研究故事。"
    );
    fitH.textContent = tx("Taiwan students, international students, undergraduates, graduate students, and exchange students","台灣學生、國際學生、大學生、研究生與交換生");
    coursesH.textContent = tx("Three course themes: fluids, fabrication, and lab-on-a-chip systems","三個教學主題：流體、製程與生物實驗室晶片");
    coursesP.textContent = tx(
      "These courses connect engineering fundamentals to devices students can see, make, measure, and eventually use in research.",
      "這些課程把工程基礎連到學生看得到、做得出、量得到，並能延伸到研究中的裝置。"
    );
    const courseData = [
      [
        "assets/research/acoustofluidics.webp",
        "Fluid Mechanics",
        "Students learn pressure, flow, boundary layers, dimensional analysis, and transport thinking, then connect those ideas to microfluidics, cooling, biological flows, and device design.",
        "流體力學",
        "學生學習壓力、流動、邊界層、因次分析與傳輸思考，再把這些觀念連到微流體、散熱、生物流動與裝置設計。"
      ],
      [
        "assets/research/ntu-biomedical-cleanroom.jpg",
        "Semiconductor Processing and Practice",
        "The course introduces cleanroom thinking, lithography, thin films, etching, process flow, contamination control, and hands-on links between fabrication steps and device performance.",
        "半導體製程與實務",
        "課程介紹無塵室觀念、微影、薄膜、蝕刻、製程流程、污染控制，以及製程步驟如何影響元件表現。"
      ],
      [
        "assets/research/lab-on-a-chip-concept.jpg",
        "Introduction to Bio-Lab-on-a-Chip",
        "Students learn how microchannels, droplets, valves, acoustic actuation, and biosensing can turn biological samples into measurable information on a chip.",
        "生物實驗室晶片導論",
        "學生學習微通道、液滴、閥件、聲波驅動與生醫感測，如何把生物樣品轉化為晶片上的可量測資訊。"
      ]
    ];
    courses.innerHTML = courseData.map(x => `
      <article class="v6-system">
        <img src="${x[0]}" alt="">
        <div>
          <span class="pill">${tx("Course","課程")}</span>
          <h3>${tx(x[1],x[3])}</h3>
          <p>${tx(x[2],x[4])}</p>
        </div>
      </article>`).join("");
    const cards = [
      ["Read before building","Start from papers, prior data, and a clear question before touching the device.","先讀懂再動手","動手前先理解論文、既有資料與清楚問題。"],
      ["Build with constraints","Make prototypes under limits: sample volume, cost, time, reliability, and validation.","在限制中製作","在樣品量、成本、時間、可靠度與驗證限制下完成原型。"],
      ["Measure with discipline","Record conditions, organise data, make figures, and check whether the result supports the claim.","有紀律地量測","記錄條件、整理資料、製作圖表，檢查結果是否支撐主張。"],
      ["Communicate clearly","Turn work into a meeting update, poster, manuscript figure, demo video, or GitHub record.","清楚表達成果","把工作轉成會議更新、海報、論文圖、展示影片或 GitHub 紀錄。"]
    ];
    ph.innerHTML = cards.map(x => `<article class="story-card"><h3>${tx(x[0],x[2])}</h3><p>${tx(x[1],x[3])}</p></article>`).join("");
    load("data/teaching.json").then(d => {
      training.innerHTML = tx(d.graduateTraining,d.graduateTrainingZh).map(x => `<span class="tag">${x}</span>`).join("");
    });
    const fitData = [
      ["Undergraduate researchers","Good for students who want first exposure to device building, experiments, and figures.","大學生專題生","適合第一次接觸裝置製作、實驗與圖表整理的學生。"],
      ["Graduate students","Good for students ready to own a research question and turn it into publishable evidence.","研究生","適合準備承擔研究問題，並把成果累積到可發表證據的學生。"],
      ["Exchange students","Good for short or medium stays with a focused build-measure-report plan.","交換生","適合以明確的製作、量測與報告計畫完成短中期研究。"],
      ["International students","Good for students who want cross-cultural teamwork around engineering for biomedical and biological systems.","國際學生","適合想在跨文化團隊中投入生醫與生物系統工程的學生。"]
    ];
    fit.innerHTML = fitData.map(x => `<section><b>${tx(x[0],x[2])}</b><p>${tx(x[1],x[3])}</p></section>`).join("");
  </script>
</body>
</html>
