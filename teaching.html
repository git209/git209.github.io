<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Teaching | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker">TEACHING</p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container"><div id="ph" class="story-grid"></div></div></section><section class="section soft"><div class="container split"><img src="assets/team/team-students.webp"><div><h2 id="gh"></h2><p class="intro" id="gt"></p><div id="training" class="tag-row"></div></div></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script>initShell("teaching");title.textContent=tx("Teaching that develops engineers, researchers, and leaders","培育工程師、研究者與未來領導者的教學");lead.textContent=tx("Teaching and research both help people understand difficult problems, build confidence, and create useful solutions.","教學與研究都在協助人理解困難問題、建立自信並創造有用的解決方案。");gh.textContent=tx("How we train future researchers","我們如何培育未來研究者");gt.textContent=tx("Students gradually move from learning methods to understanding mechanisms, defining problems, and leading a complete research story.","學生逐步從學會方法，走向理解機制、定義問題，並主導完整研究故事。");load("data/teaching.json").then(d=>{ph.innerHTML=d.philosophy.map(x=>`<article class="story-card"><h3>${tx(x[0],x[1])}</h3><p>${tx(x[2],x[3])}</p></article>`).join("");training.innerHTML=tx(d.graduateTraining,d.graduateTrainingZh).map(x=>`<span class="tag">${x}</span>`).join("");});</script></body></html>
