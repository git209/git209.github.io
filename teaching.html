<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Teaching | Yen-Wen Lu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="v6.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="page-hero">
      <div class="container">
        <p class="kicker">TEACHING</p>
        <h1 id="title"></h1>
        <p id="lead"></p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="teaching-motto">
          <p id="teachingMotto"></p>
        </div>
        <p class="kicker">COURSES I TEACH</p>
        <h2 id="coursesH"></h2>
        <p class="intro" id="coursesP"></p>
        <div class="teaching-course-list" id="courses"></div>
      </div>
    </section>

    <section class="section soft">
      <div class="container">
        <p class="kicker">TEACHING CONNECTION</p>
        <h2 id="connectH"></h2>
        <p class="intro" id="connectP"></p>
        <div class="application-grid" id="connections"></div>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script>window.BASE="";</script>
  <script src="app.js"></script>
  <script src="v6.js"></script>
  <script>
    initShell("teaching");
    title.textContent = tx("Courses that connect engineering fundamentals with real devices","把工程基礎連到真實裝置的課程");
    lead.textContent = tx(
      "My teaching focuses on four courses: Semiconductor Processing and Practice, Fluid Mechanics, Bio Lab-on-a-Chip Systems, and Engineering Graphics with Computer-Aided Drawing.",
      "我的教學目前以四門課為主：半導體製程與實務、流體力學、生物實驗室晶片、工程圖學與電腦繪圖。"
    );
    coursesH.textContent = tx("Four courses, one training direction","四門課，一個訓練方向");
    coursesP.textContent = tx(
      "Students learn how physical principles, fabrication processes, drawing language, and microfluidic systems become practical tools for biomedical and engineering problem solving.",
      "學生學習物理原理、製程方法、圖學語言與微流體系統，如何成為解決生醫與工程問題的實用工具。"
    );
    const courseData = [
      {
        image:"assets/research/ntu-biomedical-cleanroom.jpg",
        en:"Semiconductor Processing and Practice",
        zh:"半導體製程與實務",
        enText:"This course introduces cleanroom practice, lithography, thin films, etching, process flow, contamination control, and the practical link between fabrication steps and device performance.",
        zhText:"課程介紹半導體製程與感測器設計測試的基礎，包括無塵室實務、微影、薄膜、蝕刻、製程流程與污染控制，並說明製程步驟如何影響元件表現。",
        tags:["Cleanroom","Lithography","Thin films","Etching"],
        tagsZh:["無塵室","微影","薄膜","蝕刻"]
      },
      {
        image:"assets/research/bess-parallel-flow-concept.png",
        en:"Fluid Mechanics",
        zh:"流體力學",
        enText:"Fluid mechanics studies fluid phenomena and related mechanical behavior. The course builds pressure, flow, boundary layer, dimensional analysis, and transport concepts, then connects them to microfluidics, cooling systems, biological flows, and device design.",
        zhText:"流體力學研究流體現象與相關力學行為，是機械與工程領域的重要基礎課程。課程希望跳出只記公式與證明的學習方式，以較直觀的方法理解壓力、流動、邊界層、因次分析與傳輸，再連到微流體、散熱、生物流動與裝置設計。",
        tags:["Pressure","Flow","Boundary layer","Transport"],
        tagsZh:["壓力","流動","邊界層","傳輸"]
      },
      {
        image:"assets/uploads/dmf-microsystem-technology-2013.png",
        en:"Bio Lab-on-a-Chip Systems",
        zh:"生物實驗室晶片",
        enText:"Bio lab-on-a-chip systems integrate one or several laboratory functions onto millimetre-scale chips and handle very small liquid volumes. The course connects microfluidics, micro-total analysis systems, droplets, valves, actuation, and biosensing.",
        zhText:"生物實驗室晶片將一個或多個實驗室功能整合到毫米尺度晶片中，處理極小體積的流體。課程連結微流體、微小全分析系統、液滴、閥件、驅動方式與生醫感測，說明如何把生物樣品轉化為晶片上的可量測資訊。",
        tags:["Microchannels","Droplets","Valves","Biosensing"],
        tagsZh:["微通道","液滴","閥件","生醫感測"]
      },
      {
        image:"assets/research/lego-afm-demo.jpg",
        en:"Engineering Graphics and Computer-Aided Drawing",
        zh:"工程圖學與電腦繪圖",
        enText:"Students develop the graphical language needed to express engineering ideas, read technical drawings, communicate dimensions and tolerances, and use CAD tools for design communication.",
        zhText:"學生建立表達工程概念所需的圖學語言，學會閱讀工程圖、標註尺寸與公差，並使用電腦輔助繪圖工具進行設計溝通。",
        tags:["Engineering drawing","CAD","Dimensioning","Design communication"],
        tagsZh:["工程圖","CAD","尺寸標註","設計溝通"]
      }
    ];
    teachingMotto.textContent = tx(
      "The teaching spirit follows an old idea: broaden learning through knowledge, and discipline it through respect and practice.",
      "博學于文，約之以禮：以廣博的知識打開視野，再以規範、實作與負責任的態度收斂成可用能力。"
    );
    courses.innerHTML = courseData.map((c,i) => `
      <article class="teaching-course">
        <div class="teaching-image"><img src="${c.image}" alt="${tx(c.en,c.zh)}"></div>
        <div>
          <span class="pill">${tx("Course","課程")} ${String(i + 1).padStart(2,"0")}</span>
          <h3>${tx(c.en,c.zh)}</h3>
          <p>${tx(c.enText,c.zhText)}</p>
          <div class="tag-row">${(state.lang === "zh" ? c.tagsZh : c.tags).map(t => `<span class="tag">${t}</span>`).join("")}</div>
        </div>
      </article>`).join("");

    connectH.textContent = tx("From classroom concepts to laboratory judgment","從課堂概念到實驗室判斷");
    connectP.textContent = tx(
      "The four courses give students complementary abilities: fabricate devices, understand flow, design chip-based experiments, and communicate engineering ideas clearly.",
      "這四門課提供互補能力：製作元件、理解流動、設計晶片實驗，並清楚表達工程想法。"
    );
    const conn = [
      ["Fabrication literacy","Understand how a process choice changes device quality.","製程素養","理解製程選擇如何改變元件品質。"],
      ["Physical intuition","Use fluid mechanics to explain pressure, resistance, mixing, and transport.","物理直覺","用流體力學解釋壓力、阻力、混合與傳輸。"],
      ["System integration","Connect chips, sensors, samples, and readouts into a usable workflow.","系統整合","把晶片、感測器、樣品與讀出流程整合成可用系統。"],
      ["Technical communication","Use drawings and CAD to make design ideas inspectable and reproducible.","技術溝通","用圖學與 CAD 讓設計想法可檢查、可重現。"]
    ];
    connections.innerHTML = conn.map(x => `<section><b>${tx(x[0],x[2])}</b><p>${tx(x[1],x[3])}</p></section>`).join("");
  </script>
</body>
</html>
