<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Graduate Students | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker" id="group"></p><h1 id="title"></h1><p id="bio"></p></div></section><section class="section"><div class="container detail"><img id="image"><div class="panel"><h2 id="researchTitle"></h2><ul id="research"></ul><p id="email"></p></div></div></section></main><div id="footer"></div><script>window.BASE="../";</script><script src="../app.js"></script><script>initShell();load('data/people.json').then(d=>{const p=d.find(x=>x.id==='graduate-students');group.textContent=tx(p.group,p.groupZh);title.textContent=tx(p.name,p.nameZh);bio.textContent=tx(p.bio,p.bioZh);image.src=p.image;researchTitle.textContent=tx('Research and expertise','研究與專長');research.innerHTML=tx(p.research,p.researchZh).map(x=>'<li>'+x+'</li>').join('');email.innerHTML=p.email?'<a href="mailto:'+p.email+'">'+p.email+'</a>':''});</script></body></html>
