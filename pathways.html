<!doctype html>
<html><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pathways | Yen-Wen Lu Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="v6.css">
</head><body><div id="header"></div><main>
  <section class="page-hero"><div class="container"><p class="kicker">YOUR RESEARCH PATHWAY</p><h1 id="title"></h1><p id="lead"></p></div></section>
  <section class="section"><div class="container"><p class="kicker">FOR STUDENTS · 18–25</p><h2 id="studentsH"></h2><p class="intro" id="studentsP"></p><div class="v6-steps" id="steps"></div></div></section>
  <section class="section soft"><div class="container"><p class="kicker">A PLACE TO GROW</p><h2 id="skillsH"></h2><div class="v6-systems" id="skills"></div></div></section>
  <section class="section"><div class="container"><p class="kicker">MEANINGFUL PARTNERSHIPS</p><h2 id="partnerH"></h2><p class="intro" id="partnerP"></p><div class="v6-international-grid" id="partners"></div></div></section>
</main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script src="v6.js"></script><script>
initShell();
const zh=state.lang==="zh", t=(en,cn)=>zh?cn:en;
title.textContent=t("Start with a question. Leave with work you can show.","從一個問題開始，帶著能展示的成果離開。");
lead.textContent=t("For students who want to build, analyse, communicate, and work with an international team—and for partners who want research to meet a real need.","面向想要動手建立、分析、溝通並與國際團隊合作的學生；也面向希望研究真正回應需求的夥伴。");
studentsH.textContent=t("Your first research story can start here","你的第一個研究故事，可以從這裡開始");
studentsP.textContent=t("You do not need to arrive as a finished expert. You need curiosity, responsibility, and the willingness to learn by making, measuring, and explaining.","你不必一開始就是完成的專家；你需要的是好奇心、責任感，以及願意透過建立、量測與說明來學習。");
skillsH.textContent=t("Skills that travel with you","能陪你走向下一步的能力");
partnerH.textContent=t("Collaboration that changes the work","能真正改變研究的合作");
partnerP.textContent=t("The best partnerships do more than provide a logo. They sharpen the problem, open a validation path, and give students a chance to see how research becomes useful.","最好的合作不只是提供一個 Logo；它會讓問題更清楚、開啟驗證路徑，也讓學生看見研究如何變得有用。");
const stepData=[["Week 1","Orientation, safety, a project brief, three benchmark papers, and a first question worth asking.","第 1 週","完成導覽與安全訓練，讀懂專題摘要與三篇關鍵論文，提出第一個值得追問的問題。"],["Month 1","Hands-on training plus an organised dataset, a figure plan, and a short literature-based research summary.","第 1 個月","動手訓練之外，也建立可整理的資料集、圖表規劃，以及一份以文獻為本的短研究摘要。"],["Project sprint","Build, measure, analyse, and report with weekly milestones and mentor feedback—not a passive observation experience.","專題衝刺","依每週里程碑與導師回饋，完成建立、量測、分析、報告；不是被動旁觀的實習。"],["Show your work","Poster or report, figure package, open-source repository when appropriate, and a 60–90 second demo video.","展示你的成果","以海報或報告、圖表組合、適合時的開源程式庫，以及 60–90 秒展示影片，說清楚你做了什麼。"]];
steps.innerHTML=stepData.map(x=>`<section><b>${t(x[0],x[2])}</b><p>${t(x[1],x[3])}</p></section>`).join("");
const skillData=[["assets/research/lab-on-a-chip-concept.jpg","Build","Microfluidics, devices, sensors, electronics, and experimental practice.","動手做","學習微流體、元件、感測器、電子系統與實驗方法。"],["assets/research/tactile-sensor.png","Think","Read critically, ask good questions, use AI responsibly, and turn raw data into evidence.","深度想","批判閱讀、提出好問題、負責任地使用 AI，並把原始資料轉成證據。"],["assets/team/lulab-2024.jpg","Share","Work in an international team, explain your figures, and build outputs that future students can continue.","說清楚","在國際團隊中合作，說明你的圖表，並做出下一位學生能接續的成果。"]];
skills.innerHTML=skillData.map(x=>`<article class="v6-system"><img src="${x[0]}" alt=""><div><h3>${t(x[1],x[3])}</h3><p>${t(x[2],x[4])}</p></div></article>`).join("");
const partnerData=[["assets/team/kku-visit-2025.jpg","International","Students work across institutions","KKU exchange, India–Taiwan e-skin research, and visitors from Asia and North America bring people directly into project teams.","國際交流","學生跨校一起做研究","KKU 交流、印度—臺灣 e-skin 研究，以及來自亞洲與北美的訪客，讓人直接進入專題團隊。"],["assets/research/innovation-awards-2025.jpg","Research to use","Partners contribute a real constraint","Clinical, agricultural, and industry partners help define what must work outside the laboratory: usability, data quality, workflow, and validation.","走向應用","夥伴帶來真實限制","臨床、農業與業界夥伴協助定義實驗室外必須成立的條件：易用性、資料品質、工作流程與驗證。"],["assets/research/tactile-sensor.png","e-Skin collaboration","Shared prototyping and validation","NTU, IIT Kanpur / NCFlexE, NPUST, and HealthQuant Innovation connect materials, sensing, animal validation, and translation.","e-Skin 協作","共享原型與驗證","NTU、IIT Kanpur／NCFlexE、NPUST 與 HealthQuant Innovation 串連材料、感測、動物驗證與轉譯。"],["assets/research/lab-on-a-chip-concept.jpg","What we seek","Problems worth solving together","We welcome partners with a defined use case, access to meaningful validation, and commitment to shared evidence, publications, and talent development.","我們尋找的合作","值得一起解決的問題","我們歡迎具明確使用情境、可提供有意義驗證，並願意共同累積證據、發表與培育人才的夥伴。"]];
partners.innerHTML=partnerData.map(x=>`<article class="v6-international"><img src="${x[0]}" alt=""><div><span class="pill">${t(x[1],x[4])}</span><h3>${t(x[2],x[5])}</h3><p>${t(x[3],x[6])}</p></div></article>`).join("");
</script></body></html>
