<!doctype html>
<html><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pathways | Yen-Wen Lu Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="v6.css">
</head><body><div id="header"></div><main>
  <section class="page-hero"><div class="container"><p class="kicker">YOUR RESEARCH PATHWAY</p><h1 id="title"></h1><p id="lead"></p></div></section>
  <section class="section"><div class="container"><p class="kicker">FOR FUTURE LAB MEMBERS</p><h2 id="studentsH"></h2><p class="intro" id="studentsP"></p><div class="v6-steps" id="steps"></div></div></section>
  <section class="section soft"><div class="container"><p class="kicker">A PLACE TO GROW</p><h2 id="skillsH"></h2><div class="v6-systems" id="skills"></div></div></section>
  <section class="section"><div class="container"><p class="kicker">MEANINGFUL PARTNERSHIPS</p><h2 id="partnerH"></h2><p class="intro" id="partnerP"></p><div class="v6-international-grid" id="partners"></div></div></section>
</main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script src="v6.js"></script><script>
initShell();
const zh=state.lang==="zh", t=(en,cn)=>zh?cn:en;
title.textContent=t("A pathway for Taiwan and international students","給台灣與國際學生的研究路徑");
lead.textContent=t("The lab welcomes undergraduates, graduate students, and exchange students who want to learn research through hands-on systems: learn the tools, build an integrated device, collect evidence, and communicate a result that matters.","實驗室歡迎台灣與國際的大學生、研究生與交換生，透過系統實作學研究：學會工具、整合製作裝置、取得證據，並說清楚一項有意義的成果。");
studentsH.textContent=t("Is this the right lab for you?","這是適合你的實驗室嗎？");
studentsP.textContent=t("You will fit here if you want to see how research and teaching connect: turn an idea into a working device, combine mechanics, electronics, microfabrication, sensing, fluids, and data, and learn to explain the evidence.","如果你想看見研究與教學如何連在一起，這裡可能適合你：把想法做成真的會運作的裝置，結合機械、電子、微製造、感測、流體與資料，並學會說清楚證據。");
skillsH.textContent=t("Skills that travel with you","能陪你走向下一步的能力");
partnerH.textContent=t("Collaboration for technical breakthroughs","為技術突破而合作");
partnerP.textContent=t("The best partnerships sharpen the problem, open a validation path, and give students a chance to see how research becomes useful in biomedical, biological, agricultural, or industrial settings.","最好的合作會讓問題更清楚、開啟驗證路徑，也讓學生看見研究如何在生醫、生物、農業或產業場域中變得有用。");
const stepData=[["Week 1","Orientation, safety, a project brief, three benchmark papers, and a first question worth asking.","第 1 週","完成導覽與安全訓練，讀懂專題摘要與三篇關鍵論文，提出第一個值得追問的問題。"],["Month 1","Hands-on training plus an organised dataset, a figure plan, and a short literature-based research summary.","第 1 個月","動手訓練之外，也建立可整理的資料集、圖表規劃，以及一份以文獻為本的短研究摘要。"],["Project sprint","Build, measure, analyse, and report with weekly milestones and mentor feedback—not a passive observation experience.","專題衝刺","依每週里程碑與導師回饋，完成建立、量測、分析、報告；不是被動旁觀的實習。"],["Show your work","Poster or report, figure package, GitHub record when appropriate, and a 60–90 second demo video.","展示你的成果","以海報或報告、圖表組合、適合時的 GitHub 紀錄，以及 60–90 秒展示影片，說清楚你做了什麼。"]];
steps.innerHTML=stepData.map(x=>`<section><b>${t(x[0],x[2])}</b><p>${t(x[1],x[3])}</p></section>`).join("");
const skillData=[["assets/research/lab-on-a-chip-concept.jpg","Design & integrate","Combine microfluidics, mechanics, electronics, sensing, and experiments into one working system.","設計與整合","把微流體、機械、電子、感測與實驗整合成一個真正會運作的系統。"],["assets/research/tactile-sensor.png","Measure & analyse","Turn signals into evidence through careful experiments, data organisation, figures, and responsible AI-assisted analysis.","量測與分析","透過嚴謹實驗、資料整理、圖表與負責任的 AI 輔助分析，將訊號轉為證據。"],["assets/team/lulab-2024.jpg","Build with people","Explain your design, work across disciplines and cultures, and leave work that a teammate can build on.","與人一起完成","說清楚你的設計，跨領域與跨文化合作，並留下夥伴能繼續建構的成果。"]];
skills.innerHTML=skillData.map(x=>`<article class="v6-system"><img src="${x[0]}" alt=""><div><h3>${t(x[1],x[3])}</h3><p>${t(x[2],x[4])}</p></div></article>`).join("");
const partnerData=[["assets/team/kku-visit-2025.jpg","International","Students work across institutions","KKU exchange, India–Taiwan e-skin research, and visitors from Asia and North America bring people directly into project teams.","國際交流","學生跨校一起做研究","KKU 交流、印度—臺灣 e-skin 研究，以及來自亞洲與北美的訪客，讓人直接進入專題團隊。"],["assets/research/innovation-awards-2025.jpg","Research to use","Partners contribute a real constraint","Clinical, agricultural, and industry partners help define what must work outside the laboratory: usability, data quality, workflow, and validation.","走向應用","夥伴帶來真實限制","臨床、農業與業界夥伴協助定義實驗室外必須成立的條件：易用性、資料品質、工作流程與驗證。"],["assets/research/tactile-sensor.png","e-Skin collaboration","Shared prototyping and validation","NTU, IIT Kanpur / NCFlexE, NPUST, and HealthQuant Innovation connect materials, sensing, animal validation, and translation.","e-Skin 協作","共享原型與驗證","NTU、IIT Kanpur／NCFlexE、NPUST 與 HealthQuant Innovation 串連材料、感測、動物驗證與轉譯。"],["assets/research/lab-on-a-chip-concept.jpg","What we seek","Problems worth solving together","We welcome partners with a defined use case, access to meaningful validation, and commitment to shared evidence, publications, and talent development.","我們尋找的合作","值得一起解決的問題","我們歡迎具明確使用情境、可提供有意義驗證，並願意共同累積證據、發表與培育人才的夥伴。"]];
partners.innerHTML=partnerData.map(x=>`<article class="v6-international"><img src="${x[0]}" alt=""><div><span class="pill">${t(x[1],x[4])}</span><h3>${t(x[2],x[5])}</h3><p>${t(x[3],x[6])}</p></div></article>`).join("");
</script></body></html>
