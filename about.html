<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>About | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker">ABOUT</p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container split"><img src="assets/team/team-hero.webp"><div><p class="kicker">ACADEMIC IDENTITY</p><h2 id="h"></h2><p class="intro" id="t"></p></div></div></section><section class="section soft"><div class="container"><h2 id="rolesH"></h2><div class="story-grid" id="roles"></div></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script>initShell("about");title.textContent=tx("Researcher, educator, collaborator, and translator","研究者、教育者、合作推動者與成果轉譯者");lead.textContent=tx("Prof. Yen-Wen Lu builds intelligent microsystems and develops people who can connect engineering fundamentals to real-world needs.","盧彥文教授發展智慧微系統，也培育能將工程基礎與真實需求相連結的人才。");h.textContent=tx("From engineering fundamentals to intelligent systems","從工程基礎走向智慧系統");t.textContent=tx("The work begins with fluid mechanics, materials, sensing, microfabrication, and system design. It grows through data, AI, clinical collaboration, and translation.","研究從流體力學、材料、感測、微製造與系統設計出發，再延伸至資料、AI、臨床合作與成果轉譯。");rolesH.textContent=tx("Four roles, one integrated mission","四種角色，一個整合使命");roles.innerHTML=[["Researcher","研究者"],["Educator","教育者"],["Collaborator","合作推動者"],["Translator","成果轉譯者"]].map(x=>`<article class="story-card"><h3>${tx(x[0],x[1])}</h3><p>${tx("Develop people and systems that create meaningful impact.","培育人才並建立能創造實際影響的系統。")}</p></article>`).join("");</script></body></html>
