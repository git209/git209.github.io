<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Join Us | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker">JOIN US</p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container join-grid" id="cards"></div></section><section class="section soft"><div class="container faq"><h2 id="fh"></h2><div id="faq"></div></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script>initShell("join");title.textContent=tx("Join a team that values curiosity, responsibility, and impact","加入重視好奇、責任與影響力的團隊");lead.textContent=tx("We welcome students and researchers who want strong engineering foundations, increasing independence, and meaningful problems.","歡迎希望建立扎實工程基礎、逐步獨立並投入重要問題的學生與研究人員。");const a=[["Real projects","真實題目"],["Hands-on learning","實作學習"],["Interdisciplinary growth","跨領域成長"],["International exposure","國際經驗"],["Publication & IP","論文與智財"],["Career development","職涯發展"]];cards.innerHTML=a.map(x=>`<article class="story-card"><h3>${tx(x[0],x[1])}</h3><p>${tx("Training that connects knowledge, practice, responsibility, and impact.","讓知識、實作、責任與影響力相互連結的訓練。")}</p></article>`).join("");fh.textContent=tx("Frequently asked questions","常見問題");faq.innerHTML=[["Do I need prior microfluidics experience?","一定要有微流體經驗嗎？"],["Can students work across research themes?","可以跨研究主題嗎？"],["Are international students welcome?","歡迎國際學生嗎？"]].map(x=>`<details><summary>${tx(x[0],x[1])}</summary><p>${tx("Strong fundamentals, curiosity, and willingness to learn matter most.","扎實基礎、好奇心與願意學習最重要。")}</p></details>`).join("");</script></body></html>
