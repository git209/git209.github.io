<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>News | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><h1 id="title"></h1><p id="intro"></p></div></section><section class="section"><div class="container"><div id="filters" class="filters"></div><div id="list"></div></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script>initShell();title.textContent=tx('News','最新消息');intro.textContent=tx('Awards, publications, conferences, international exchange, and team milestones.','研究獎項、論文、會議、國際交流與團隊里程碑。');load('data/news.json').then(d=>{const cats=[...new Set(d.map(x=>tx(x.category,x.categoryZh)))];filters.innerHTML='<button class="filter active" data-c="all">'+tx('All','全部')+'</button>'+cats.map(c=>'<button class="filter" data-c="'+c+'">'+c+'</button>').join('');const draw=c=>list.innerHTML=d.filter(x=>c==='all'||tx(x.category,x.categoryZh)===c).map(x=>`<article class="news-item ${x.image?'news-with-image':''}">${x.image?`<img src="${x.image}" alt="">`:''}<div><time>${x.date} · ${tx(x.category,x.categoryZh)}</time><h3>${tx(x.title,x.titleZh)}</h3><p>${tx(x.text,x.textZh)}</p></div></article>`).join('');draw('all');filters.querySelectorAll('button').forEach(b=>b.onclick=()=>{filters.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');draw(b.dataset.c)})});</script></body></html>
