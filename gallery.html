<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gallery | Yen-Wen Lu</title><meta name="description" content="Yen-Wen Lu Intelligent Microsystems Research Group at National Taiwan University.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"></head><body><div id="header"></div>
<main><section class="page-hero"><div class="container"><p class="eyebrow">YEN-WEN LU · NTU</p><h1 data-t="galleryPageTitle"></h1><p data-t="galleryPageIntro"></p></div></section>
<section class="section"><div class="container"><div id="galleryFilters" class="filters"></div><div id="galleryList" class="grid gallery-grid"></div><p class="source-note">Selected legacy photographs are loaded from the public image assets of the former Wix site.</p></div></section></main><div id="footer"></div>
<script src="data/site-data.js"></script><script src="data/i18n.js"></script><script src="app.js"></script>
<script>function renderPage(){document.querySelector("#header").innerHTML=header("gallery");document.querySelector("#footer").innerHTML=footer();setStaticText();initNav();
const cats=[...new Set(SITE_DATA.gallery.map(g=>g.category))];document.querySelector("#galleryFilters").innerHTML=`<button class="filter active" data-cat="all">${t().filterAll}</button>`+cats.map(c=>`<button class="filter" data-cat="${c}">${c}</button>`).join("");
function draw(cat="all"){document.querySelector("#galleryList").innerHTML=SITE_DATA.gallery.filter(g=>cat==="all"||g.category===cat).map(galleryCard).join("")}draw();
document.querySelectorAll(".filter").forEach(b=>b.onclick=()=>{document.querySelectorAll(".filter").forEach(x=>x.classList.remove("active"));b.classList.add("active");draw(b.dataset.cat)});
}renderPage();</script></body></html>
