gh-level academic communication. They do not disclose raw data, unpublished methods, participant information, confidential partner material, or rights to use intellectual property.","研究資訊","專題說明為高層次的學術溝通，不公開原始資料、未發表方法、受試者資訊、合作夥伴機密資料，也不授與智慧財產使用權。"],["Publications and third-party services","Publication rights remain with their respective authors and publishers. Embedded video and external links are governed by their own platforms' terms and privacy practices.","論文與第三方服務","論文權利仍屬各作者與出版社；嵌入影片與外部連結則受各平台自己的條款與隱私政策規範。"],["Requesting removal or correction","If you are pictured, named, or represented here and would like a correction or removal considered, please contact the laboratory. We will review legitimate requests promptly.","更正或移除申請","若您被網站呈現為照片、姓名或相關描述，且希望更正或評估移除，請聯絡實驗室；我們會儘速審查合理申請。"],["No automated harvesting","Automated scraping, bulk downloading, dataset creation, facial recognition, or training of models on this site's images or text is not permitted without prior written permission.","禁止自動化蒐集","未經事前書面同意，禁止自動爬取、大量下載、建立資料集、臉部辨識，或以本站圖文訓練模型。"]];terms.innerHTML=items.map(x=>`<article class="story-card"><h3>${t(x[0],x[2])}</h3><p>${t(x[1],x[3])}</p></article>`).join("");contactH.textContent=t("Questions or permissions","詢問與授權");contactP.textContent=t("For image permission, content correction, privacy concerns, or research-use enquiries, contact:","如需圖片授權、內容更正、隱私疑慮或研究使用詢問，請聯絡：");</script></body></html>
