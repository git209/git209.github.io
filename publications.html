<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Publications | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700,800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><p class="kicker">PUBLICATIONS · 2022–PRESENT</p><h1 id="title"></h1><p id="lead"></p></div></section><section class="section"><div class="container"><div id="filters" class="filters"></div><div id="list" class="publication-grid"></div></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script>initShell();title.textContent=tx("Basic science and technology innovation for human progress","基礎科學與科技創新，推進人類進步");lead.textContent=tx("Selected journal results since 2022 show how fundamental mechanisms become novel devices, reliable evidence, and technologies with practical value.","2022 年以來的精選期刊成果，呈現基礎機制如何成為新穎元件、可靠證據與具實用價值的科技。");load("data/publications.json").then(d=>{const ts=[...new Set(d.map(x=>tx(x.topic,x.topicZh)))];filters.innerHTML=`<button class="filter active" data-t="all">${tx("All","全部")}</button>`+ts.map(t=>`<button class="filter" data-t="${t}">${t}</button>`).join("");const draw=t=>list.innerHTML=d.filter(x=>t==="all"||tx(x.topic,x.topicZh)===t).map(x=>`<article class="publication-card"><img src="${x.image}" alt=""><div><span class="pill">${x.year} · ${tx(x.topic,x.topicZh)}</span><h3>${x.title}</h3><p>${x.authors} · <i>${x.journal}</i></p><p class="pub-status">${tx(x.status,x.statusZh)}</p>${x.doi!=="#"?`<a class="text-link" target="_blank" rel="noopener" href="${x.doi}">DOI ↗</a>`:""}</div></article>`).join("");draw("all");filters.querySelectorAll("button").forEach(b=>b.onclick=()=>{filters.querySelectorAll("button").forEach(x=>x.classList.remove("active"));b.classList.add("active");draw(b.dataset.t)})});</script></body></html>
