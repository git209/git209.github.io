<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Publications | Yen-Wen Lu</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><div id="header"></div><main><section class="page-hero"><div class="container"><h1 id="title"></h1><p id="intro"></p></div></section><section class="section"><div class="container"><div class="notice" id="notice"></div><div id="filters" class="filters"></div><div id="pubs"></div></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script>initShell();title.textContent=tx('Publications','著作');intro.textContent=tx('Filter publications by research topic.','依研究領域篩選著作。');notice.textContent=tx('Replace the clearly marked placeholder metadata with verified citations before formal launch.','正式上線前，請將清楚標示的書目示意資料替換為已確認引用資訊。');load('data/publications.json').then(d=>{const topics=[...new Set(d.map(x=>tx(x.topic,x.topicZh)))];filters.innerHTML='<button class="filter active" data-c="all">'+tx('All','全部')+'</button>'+topics.map(c=>'<button class="filter" data-c="'+c+'">'+c+'</button>').join('');const draw=c=>pubs.innerHTML=d.filter(x=>c==='all'||tx(x.topic,x.topicZh)===c).sort((a,b)=>b.year-a.year).map(x=>`<article class="pub"><span class="pill">${x.year} · ${tx(x.topic,x.topicZh)}</span><h3>${tx(x.title,x.titleZh)}</h3><div class="pub-meta">${x.authors} · <i>${x.journal}</i></div><p>${tx(x.note,x.noteZh)}</p><a href="${x.doi}">DOI / Publisher →</a></article>`).join('');draw('all');filters.querySelectorAll('button').forEach(b=>b.onclick=()=>{filters.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');draw(b.dataset.c)})});</script></body></html>
