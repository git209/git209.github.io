<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yen-Wen Lu Lab | Miniaturized Chips for Better Life</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="v6.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <section class="hero">
      <div class="container hero-content">
        <p class="kicker">NATIONAL TAIWAN UNIVERSITY · BIOMECHATRONICS</p>
        <h1 id="title"></h1>
        <p class="lead" id="lead"></p>
        <div class="actions">
          <a class="btn primary" href="research.html" id="researchBtn"></a>
          <a class="btn ghost" href="international.html" id="intlBtn"></a>
          <a class="btn ghost" href="collaboration.html" id="collabBtn"></a>
        </div>
      </div>
    </section>

    <section class="section ntu-section">
      <div class="container ntu-panel">
        <div>
          <p class="kicker">ROOTED AT NTU</p>
          <h2 id="ntuTitle"></h2>
          <p class="intro" id="ntuLead"></p>
        </div>
        <div class="ntu-motto" id="ntuMotto"></div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <p class="kicker">RESEARCH TOPICS</p>
        <h2 id="valueTitle"></h2>
        <p class="intro" id="valueLead"></p>
        <div class="v6-systems" id="systems"></div>
      </div>
    </section>

    <section class="section soft">
      <div class="container">
        <p class="kicker">FEATURED COVER RESEARCH</p>
        <div class="v6-feature">
          <img src="assets/research/acoustic-labchip-cover-2023.jpg" alt="Lab on a Chip cover feature for bubble-based acoustic filtration">
          <div>
            <span class="pill" id="coverPill"></span>
            <h2 id="coverTitle"></h2>
            <p class="intro" id="coverLead"></p>
            <div class="feature-points" id="coverPoints"></div>
            <a class="text-link" href="research/acoustofluidics.html" id="coverLink"></a>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="application-grid compact-applications" id="applications"></div>
      </div>
    </section>

    <section class="section soft">
      <div class="container">
        <p class="kicker">RESEARCH VIDEOS</p>
        <h2 id="videoTitle"></h2>
        <p class="intro" id="videoLead"></p>
        <div class="home-video-grid" id="homeVideos"></div>
      </div>
    </section>

    <section class="section soft">
      <div class="container">
        <p class="kicker">TEACHING</p>
        <h2 id="teachTitle"></h2>
        <p class="intro" id="teachLead"></p>
        <a class="text-link" href="teaching.html" id="teachLink"></a>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <p class="kicker">INTERNATIONAL COLLABORATION & STUDENTS</p>
        <h2 id="joinTitle"></h2>
        <p class="intro" id="joinLead"></p>
        <div class="join-points" id="joinPoints"></div>
      </div>
    </section>

    <section class="section soft">
      <div class="container">
        <p class="kicker">SELECTED PUBLICATIONS</p>
        <h2 id="pubTitle"></h2>
        <div id="pubs" class="v6-systems"></div>
        <a class="text-link" href="publications.html" id="allpubs"></a>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script>window.BASE="";</script>
  <script src="app.js"></script>
  <script src="v6.js"></script>
  <script>
    initShell();
    title.textContent = v6Text(
      "Miniaturized chips for better technology and life",
      "微型化晶片，更好人類科技生活"
    );
    lead.textContent = v6Text(
      "We develop microfluidic chips, sensing devices, and intelligent mechatronic systems that help small-volume samples, physiological signals, and biological processes become measurable engineering evidence.",
      "我們發展微流體晶片、感測裝置與智慧機電系統，讓小體積樣品、生理訊號與生物流程，轉化為可量測、可驗證的工程證據。"
    );
    researchBtn.textContent = v6Text("Research topics","研究題目");
    intlBtn.textContent = v6Text("International collaboration","國際合作與學生");
    collabBtn.textContent = v6Text("Industry collaboration","產學合作");

    ntuTitle.textContent = v6Text("Building research from the spirit of National Taiwan University","從臺灣大學精神出發的研究與教學");
    ntuLead.textContent = v6Text(
      "The lab is part of National Taiwan University and the Department of Biomechatronics Engineering. The NTU motto, \"Cultivate virtue, advance learning, love one's country, and love people,\" is reflected here as responsible research, disciplined learning, and technology that serves society.",
      "實驗室隸屬國立臺灣大學生物機電工程學系。臺大校訓「敦品、勵學、愛國、愛人」在這裡轉化為負責任的研究、扎實的學習，以及能服務社會的科技。"
    );
    const motto = [
      ["Cultivate virtue","Research integrity and respect for people.","敦品","重視研究誠信與對人的尊重。"],
      ["Advance learning","Keep asking why and make every measurement traceable.","勵學","持續追問為什麼，讓每一次量測可追溯。"],
      ["Love one's country","Connect engineering to public needs and real validation.","愛國","讓工程研究連結公共需求與真實驗證。"],
      ["Care for people","Design technology around health, dignity, and daily life.","愛人","以健康、尊嚴與日常生活為科技設計的核心。"]
    ];
    ntuMotto.innerHTML = motto.map(x => `<section><b>${v6Text(x[0],x[2])}</b><p>${v6Text(x[1],x[3])}</p></section>`).join("");

    valueTitle.textContent = v6Text("Research topics connected to measurement, care, and production","研究題目連到量測、照護與生產流程");
    valueLead.textContent = v6Text(
      "Each project starts from a bottleneck: a sample is difficult to prepare, a signal is difficult to measure, a device is difficult to stabilise, or a biological process needs better engineering control.",
      "每個題目都從瓶頸開始：樣品難以前處理、訊號不易量測、裝置需要更穩定，或生物流程需要更好的工程控制。"
    );

    coverPill.textContent = v6Text("Lab on a Chip 2024 · Cover feature","Lab on a Chip 2024 · 封面特色");
    coverTitle.textContent = v6Text(
      "Bubble-based acoustic filtration for high-efficiency sperm enrichment",
      "以氣泡聲流過濾實現高效率精子富集"
    );
    coverLead.textContent = v6Text(
      "This work uses acoustic streaming and bubble dynamics to reduce filter fouling, improve cross-flow efficiency, and enrich sperm from highly imbalanced forensic mock samples for downstream STR analysis.",
      "這項研究利用聲流與氣泡動力學，降低微尺度過濾阻塞、提升錯流效率，並從高度不均衡的法醫模擬樣品中富集精子，支援後續 STR 分析。"
    );
    const points = [
      ["Problem addressed","Turns a difficult forensic sample-preparation problem into a microfluidic separation workflow."],
      ["Research quality","Selected as a Lab on a Chip cover feature and built on measurable recovery, purity, and STR-readout performance."],
      ["Research attitude","A clear example for students: physics, device design, and biological analysis must be tested together."]
    ];
    const pointsZh = [
      ["解決的問題","把困難的法醫樣品前處理問題，轉化為可操作的微流體分離流程。"],
      ["研究品質","獲選 Lab on a Chip 封面特色，並以回收率、純度與 STR 讀出表現支撐成果。"],
      ["研究態度","很適合學生理解：物理機制、晶片設計與生物分析需要一起驗證。"]
    ];
    coverPoints.innerHTML = (state.lang === "zh" ? pointsZh : points).map(x =>
      `<section><b>${x[0]}</b><p>${x[1]}</p></section>`
    ).join("");
    coverLink.textContent = v6Text("Read the acoustofluidics story →","閱讀聲流體研究故事 →");

    const appItems = [
      ["Biomedical engineering","Microfluidic sample preparation, dialysis monitoring, and sensing systems for health-related research and decision support."],
      ["Rehabilitation and sports science","Wearable pressure, motion, and physiological sensing for posture, recovery, training, and performance tracking."],
      ["Breeding and bio-industry","Sensors and data workflows for animal physiology, environmental response, and production-process observation."],
      ["Animal medicine","Mechatronic sensing platforms that support repeatable measurement of animal-health indicators."]
    ];
    const appItemsZh = [
      ["生物醫學工程","微流體樣品前處理、透析監測與健康研究／決策支援相關感測系統。"],
      ["復健與運動科學","用穿戴式壓力、動作與生理感測追蹤恢復、姿態、訓練與表現。"],
      ["育種與生物產業","以感測器與資料流程觀察動物生理、環境反應與生產流程。"],
      ["動物醫學","以機電感測平台支援動物健康指標的可重複量測。"]
    ];
    applications.innerHTML = (state.lang === "zh" ? appItemsZh : appItems).map(x =>
      `<section><b>${x[0]}</b><p>${x[1]}</p></section>`
    ).join("");

    teachTitle.textContent = v6Text("Courses connect fundamentals with devices students can design, build, and explain","課程把基礎觀念連到學生能設計、製作與說明的裝置");
    teachLead.textContent = v6Text(
      "Teaching covers semiconductor processing, fluid mechanics, bio lab-on-a-chip systems, and engineering graphics with computer-aided drawing.",
      "教學涵蓋半導體製程與實務、流體力學、生物實驗室晶片，以及工程圖學與電腦繪圖。"
    );
    teachLink.textContent = v6Text("View teaching courses →","查看教學課程 →");

    videoTitle.textContent = v6Text("See research ideas in motion","觀看研究概念如何運作");
    videoLead.textContent = v6Text(
      "These videos connect earlier lab themes with current research: exosome microfluidics, self-powered digital microfluidics, LEGO-based AFM education, optofluidic switching, and wearable AI.",
      "這些影片把早期研究主題與目前方向連起來：外泌體微流體、自供電數位微流體、樂高 AFM 教育展示、光流體開關，以及穿戴裝置與 AI。"
    );
    const videos = [
      ["972roQFlIqo","Exosome microfluidics","外泌體微流體","research/exosome-engineering.html"],
      ["4xJ3vyuzWd0","TENG-powered DMF","TENG 自供電數位微流體","research/digital-microfluidics.html"],
      ["1okl0gkwwUw","LEGO atomic force microscope","樂高原子力顯微鏡","research.html"],
      ["zE-CWq-Wl2g","Digital microfluidic optical switch","數位微流體光學開關","research/digital-microfluidics.html"],
      ["CWvfrA86jak","Wearable devices and AI","穿戴裝置與 AI","research/wearable-sensors.html"]
    ];
    homeVideos.innerHTML = videos.map(v => `
      <article class="home-video-card">
        <div class="video-frame"><iframe src="https://www.youtube-nocookie.com/embed/${v[0]}" title="${v6Text(v[1],v[2])}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
        <div><b>${v6Text(v[1],v[2])}</b><a class="text-link" href="${v[3]}">${v6Text("Related topic →","相關主題 →")}</a></div>
      </article>`).join("");

    joinTitle.textContent = v6Text("Students who want to connect engineering with life systems are welcome","歡迎想把工程連到生命系統的同學加入");
    joinLead.textContent = v6Text(
      "The team is a good fit for Taiwan and international students who want to connect mechanical engineering, mechatronics, biomedical engineering, data science, and hands-on device development.",
      "如果你是台灣或國際學生，想把機械、機電、生醫工程、數據科學與動手製作裝置連在一起，這裡會有適合你練習與成長的題目。"
    );
    const joinItems = [
      ["Mechanical / mechatronics","Design mechanisms, fixtures, microfluidic structures, sensors, and test platforms."],
      ["Biomedical engineering","Connect device output to cells, fluids, physiological signals, rehabilitation, or clinical questions."],
      ["Data science","Turn measured signals into analysis, validation, models, and decisions that can be checked."]
    ];
    const joinItemsZh = [
      ["機械 / 機電","設計機構、治具、微流體結構、感測器與測試平台。"],
      ["生醫工程","把裝置輸出連到細胞、流體、生理訊號、復健或臨床問題。"],
      ["數據科學","把量測訊號轉成分析、驗證、模型與可以被檢查的決策。"]
    ];
    joinPoints.innerHTML = (state.lang === "zh" ? joinItemsZh : joinItems).map(x =>
      `<section><b>${x[0]}</b><p>${x[1]}</p></section>`
    ).join("");
    pubTitle.textContent = v6Text("Selected research results","精選研究成果");
    allpubs.textContent = v6Text("View publications since 2022 →","查看 2022 年後期刊成果 →");
    load("data/v6/current-systems.json").then(d => systems.innerHTML = d.map(v6SystemCard).join(""));
    load("data/publications.json").then(d => pubs.innerHTML = d.slice(0,3).map(x => `
      <article class="v6-system">
        <img src="${x.image}" alt="">
        <div>
          <span class="pill">${x.year} · ${v6Text(x.topic,x.topicZh)}</span>
          <h3>${x.title}</h3>
          <p><i>${x.journal}</i></p>
          <p>${v6Text(x.status,x.statusZh)}</p>
          ${x.doi !== "#" ? `<a class="text-link" href="${x.doi}" target="_blank">DOI ↗</a>` : ""}
        </div>
      </article>`).join(""));
  </script>
</body>
</html>
