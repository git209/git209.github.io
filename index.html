<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yen-Wen Lu Lab</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Merriweather:wght@700&family=Noto+Sans+TC:wght@400;600;700,800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="v6.css"></head><body><div id="header"></div><main><section class="hero"><div class="container hero-content"><p class="kicker">NATIONAL TAIWAN UNIVERSITY · BIOMECHATRONICS</p><h1 id="title"></h1><p class="lead" id="lead"></p><div class="actions"><a class="btn primary" href="pathways.html" id="pbtn"></a><a class="btn ghost" href="research.html" id="ibtn"></a></div></div></section><section class="v6-band"><div class="container"><p id="statement"></p></div></section><section class="section"><div class="container"><p class="kicker">CURRENT SYSTEMS</p><h2 id="systemsTitle"></h2><div class="v6-systems" id="systems"></div></div></section><section class="section soft"><div class="container"><p class="kicker">SELECTED PUBLICATIONS</p><h2 id="pubTitle"></h2><div id="pubs" class="v6-systems"></div><a class="text-link" href="publications.html" id="allpubs"></a></div></section></main><div id="footer"></div><script>window.BASE="";</script><script src="app.js"></script><script src="v6.js"></script><script>initShell();title.textContent=v6Text("Advanced microsystems, built by integrating ideas into working devices","先進微小系統：把想法整合成真正會運作的元件");lead.textContent=v6Text("We make and integrate microfluidics, sensors, electronics, mechanics, and data systems. The goal is hands-on biomechatronics that can measure the real world and create useful decisions.","我們動手製作並整合微流體、感測器、電子、機械與資料系統。目標是能量測真實世界、並產生有用決策的實作型生物機電系統。");pbtn.textContent=v6Text("See how students build here","看看學生如何在這裡動手做");ibtn.textContent=v6Text("Explore the technology map","探索科技地圖");statement.textContent=v6Text("From basic mechanisms to integrated prototypes: build it, test it, understand it, and make it useful.","從基礎機制到整合原型：動手做、確實測、真正理解，並讓技術有用。 ");systemsTitle.textContent=v6Text("What we are building now","我們正在整合製作什麼");pubTitle.textContent=v6Text("Selected research results","精選研究成果");allpubs.textContent=v6Text("View publications since 2022 →","查看 2022 年後期刊成果 →");load("data/v6/current-systems.json").then(d=>systems.innerHTML=d.map(v6SystemCard).join(""));load("data/publications.json").then(d=>pubs.innerHTML=d.slice(0,3).map(x=>`<article class="v6-system"><img src="${x.image}" alt=""><div><span class="pill">${x.year} · ${v6Text(x.topic,x.topicZh)}</span><h3>${x.title}</h3><p><i>${x.journal}</i></p>${x.doi!=="#"?`<a class="text-link" href="${x.doi}" target="_blank">DOI ↗</a>`:""}</div></article>`).join(""));</script></body></html>
